name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: linux
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev
      - name: Build release
        run: cargo build --release
        working-directory: linux
      - name: Package binary tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL="acamera-${VERSION}-linux-amd64.tar.gz"
          mkdir -p staging/bin staging/share/acamera
          cp linux/target/release/acamera-receiver staging/bin/
          cp linux/target/release/acamera-gtk staging/bin/
          cp android/app/build/outputs/apk/release/*.apk staging/share/acamera/acamera.apk 2>/dev/null || true
          tar -czf "${TARBALL}" -C staging .
          echo "TARBALL=${TARBALL}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: acamera-*-linux-amd64.tar.gz

  build-deb:
    runs-on: ubuntu-latest
    needs: build-linux-binaries
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: bin/
      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: apk/ 2>/dev/null || true
      - name: Build .deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKGDIR="acamera_${VERSION}_amd64"
          mkdir -p "${PKGDIR}/DEBIAN"
          mkdir -p "${PKGDIR}/usr/bin"
          mkdir -p "${PKGDIR}/usr/share/applications"
          mkdir -p "${PKGDIR}/usr/share/acamera"
          cp bin/acamera-receiver "${PKGDIR}/usr/bin/"
          cp bin/acamera-gtk "${PKGDIR}/usr/bin/"
          chmod 755 "${PKGDIR}/usr/bin/"*
          cp apk/*.apk "${PKGDIR}/usr/share/acamera/acamera.apk" 2>/dev/null || true
          cat > "${PKGDIR}/DEBIAN/control" << EOF
          Package: acamera
          Version: ${VERSION}
          Section: video
          Priority: optional
          Architecture: amd64
          Depends: libgtk-4-1, gstreamer1.0-plugins-base, gstreamer1.0-plugins-good, gstreamer1.0-libav, v4l2loopback-dkms, pipewire, pulseaudio-utils
          Maintainer: ACamera <noreply@github.com>
          Description: Use an Android phone as a Linux camera and microphone
          ACamera streams your Android camera and microphone to a Linux desktop,
          creating virtual video and audio devices for any application.
          EOF
          cat > "${PKGDIR}/usr/share/applications/acamera.desktop" << EOF
          [Desktop Entry]
          Type=Application
          Name=ACamera
          Comment=Use an Android phone as a Linux camera and microphone
          Exec=/usr/bin/acamera-gtk
          Terminal=false
          Categories=AudioVideo;Video;
          Icon=camera-web
          EOF
          dpkg-deb --root-owner-group --build "${PKGDIR}"
          echo "DEB=${PKGDIR}.deb" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: acamera_*.deb

  build-appimage:
    runs-on: ubuntu-latest
    needs: build-linux-binaries
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: bin/
      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: apk/ 2>/dev/null || true
      - name: Build AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APPDIR="ACamera.AppDir"
          mkdir -p "${APPDIR}/usr/bin" "${APPDIR}/usr/share/applications" "${APPDIR}/usr/share/acamera" "${APPDIR}/usr/share/icons/hicolor/256x256/apps"
          cp bin/acamera-receiver "${APPDIR}/usr/bin/"
          cp bin/acamera-gtk "${APPDIR}/usr/bin/"
          chmod 755 "${APPDIR}/usr/bin/"*
          cp apk/*.apk "${APPDIR}/usr/share/acamera/acamera.apk" 2>/dev/null || true
          cat > "${APPDIR}/acamera.desktop" << EOF
          [Desktop Entry]
          Type=Application
          Name=ACamera
          Comment=Use an Android phone as a Linux camera and microphone
          Exec=acamera-gtk
          Terminal=false
          Categories=AudioVideo;Video;
          Icon=camera-web
          EOF
          cat > "${APPDIR}/AppRun" << 'APPRUN'
          #!/bin/bash
          APPDIR="$(dirname "$(readlink -f "$0")")"
          export PATH="${APPDIR}/usr/bin:${PATH}"
          exec acamera-gtk "$@"
          APPRUN
          chmod +x "${APPDIR}/AppRun"
          VERSION="${VERSION}" appimage/appimagetool --appimage-extract-and-run "${APPDIR}" "ACamera-${VERSION}-x86_64.AppImage" 2>/dev/null || \
            echo "appimagetool not available, skipping AppImage build"
      - uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: ACamera-*.AppImage

  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build APK
        run: ./gradlew assembleRelease
        working-directory: android
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  publish:
    runs-on: ubuntu-latest
    needs: [build-linux-binaries, build-deb, build-appimage, build-apk]
    steps:
      - uses: actions/download-artifact@v4
      - name: Collect artifacts
        run: |
          mkdir -p release
          find . -name "*.deb" -exec cp {} release/ \;
          find . -name "*.AppImage" -exec cp {} release/ \;
          find . -name "*.tar.gz" -exec cp {} release/ \;
          find . -name "*.apk" -exec cp {} release/ \;
          ls -la release/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false

  publish-deb-repo:
    runs-on: ubuntu-latest
    needs: build-deb
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: deb-package
      - name: Publish to GitHub Packages APT repo
        run: |
          echo "Publishing .deb to GitHub Packages APT repository"
          find . -name "*.deb" -ls
          # GitHub Packages APT repo publish via gh CLI
          # gh release upload ... --clobber
